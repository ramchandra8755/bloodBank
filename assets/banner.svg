<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  
  <!-- Large Blood Drop -->
  <path d="M400 50 L460 150 A70 70 0 1 1 340 150 Z" fill="#ffffff" opacity="0.9"/>
  
  <!-- Heart Shape -->
  <g transform="translate(380 180) scale(0.8)">
    <path d="M0 0 L30 50 A35 35 0 1 1 -30 50 Z" 
          fill="#ffffff" 
          opacity="0.7"
          transform="rotate(-45)"/>
    <path d="M0 0 L30 50 A35 35 0 1 1 -30 50 Z" 
          fill="#ffffff" 
          opacity="0.7"
          transform="rotate(45) translate(-20 -20)"/>
  </g>
  
  <!-- Pulse Line -->
