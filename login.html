<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header text-center">
                        <i class="bi bi-droplet-fill blood-icon"></i>
                        <h2 class="mb-3">Welcome Back</h2>
                        <p class="tagline">Every drop counts. Your donation saves lives.</p>
                    </div>
                    <div class="card-body p-4">
                        <div class="alert alert-danger d-none" id="errorMessage"></div>
                        <form id="loginForm">
                            <div class="mb-4">
                                <label for="email" class="form-label">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0">
                                        <i class="bi bi-envelope"></i>
                                    </span>
                                    <input type="email" class="form-control border-start-0" id="email" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0">
                                        <i class="bi bi-lock"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0" id="password" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Login
                            </button>
                        </form>

                                <i class="bi bi-person-plus me-1"></i>

                        <div class="text-center">
                            <a href="blood-bank/login.php" class="d-block mb-2">

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            
            try {
                const response = await fetch('api/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = 'index.php';
                } else {
                    alert(data.message || 'Login failed!');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred during login');
            }
        });
        // Update the login form handler
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };
    
    try {
        const response = await fetch('api/auth/login.php', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (response.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user_type', data.user.type);
            
            // Redirect based on user type
            if (data.user.type === 'bank_admin') {
                window.location.href = 'blood-bank/dashboard.php';
            } else {
                window.location.href = 'index.php';
            }
        } else {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = data.error;
            errorDiv.classList.remove('d-none');
        }
    } catch (error) {
        console.error('Error:', error);
    }
}); 
    </script>
</body>
