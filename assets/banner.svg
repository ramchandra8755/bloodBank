  <!-- Decorative Drops -->
  <g opacity="0.5">
    <path d="M600 150 L615 175 A15 15 0 1 1 585 175 Z" fill="#ffffff"/>
    <path d="M200 180 L215 205 A15 15 0 1 1 185 205 Z" fill="#ffffff"/>
